version: '3.8'

services:
  dashboard:
    image: beliver247/greendevops-dashboard:latest
    container_name: release-dashboard
    restart: unless-stopped
    ports:
      - "5003:5050"
    volumes:
      - dashboard_data_v2:/app/data
    environment:
      - DASHBOARD_DB=/app/data/dashboard.db

volumes:
  dashboard_data_v2:
